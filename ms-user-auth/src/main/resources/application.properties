spring.application.name=ms-user-auth
server.port=8084

# ---- Base de datos ----
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sanossalvos}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sanossalvos}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sanossalvos}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ---- JWT ----
jwt.secret=${JWT_SECRET:clave_local_desarrollo_no_usar_en_produccion}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
