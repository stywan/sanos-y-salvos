services:

  # ─────────────────────────────────────────────
  # Base de datos
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sanossalvos
      POSTGRES_PASSWORD: sanossalvos
      POSTGRES_DB: sanossalvos
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanossalvos"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Almacenamiento de objetos (fotos de mascotas)
  # Consola web: http://localhost:9001
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: sanossalvos
      MINIO_ROOT_PASSWORD: sanossalvos123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Inicialización de MinIO (crea el bucket si no existe)
  # Se ejecuta una sola vez y termina.
  # ─────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 sanossalvos sanossalvos123 &&
      mc mb --ignore-existing local/fotos-mascotas &&
      mc anonymous set public local/fotos-mascotas &&
      echo 'Bucket fotos-mascotas listo.'
      "
    restart: on-failure

  # ─────────────────────────────────────────────
  # Microservicios
  # ─────────────────────────────────────────────
  ms-user-auth:
    build: ./ms-user-auth
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sanossalvos
      SPRING_DATASOURCE_USERNAME: sanossalvos
      SPRING_DATASOURCE_PASSWORD: sanossalvos
      JWT_SECRET: ${JWT_SECRET:-clave_local_desarrollo_no_usar_en_produccion}
      JWT_EXPIRATION_MS: 86400000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 360s

  ms-pet-management:
    build: ./ms-pet-management
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sanossalvos
      SPRING_DATASOURCE_USERNAME: sanossalvos
      SPRING_DATASOURCE_PASSWORD: sanossalvos
      JWT_SECRET: ${JWT_SECRET:-clave_local_desarrollo_no_usar_en_produccion}
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: sanossalvos
      MINIO_SECRET_KEY: sanossalvos123
      MINIO_BUCKET: fotos-mascotas
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 360s

  ms-geolocation:
    build: ./ms-geolocation
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sanossalvos
      SPRING_DATASOURCE_USERNAME: sanossalvos
      SPRING_DATASOURCE_PASSWORD: sanossalvos
      JWT_SECRET: ${JWT_SECRET:-clave_local_desarrollo_no_usar_en_produccion}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 360s

  ms-matching-engine:
    build: ./ms-matching-engine
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sanossalvos
      SPRING_DATASOURCE_USERNAME: sanossalvos
      SPRING_DATASOURCE_PASSWORD: sanossalvos
      JWT_SECRET: ${JWT_SECRET:-clave_local_desarrollo_no_usar_en_produccion}
      PET_MANAGEMENT_URL: http://ms-pet-management:8081
      GEOLOCATION_URL: http://ms-geolocation:8082
      NOTIFICATION_URL: http://ms-notification:8085
    depends_on:
      postgres:
        condition: service_healthy
      ms-pet-management:
        condition: service_healthy
      ms-geolocation:
        condition: service_healthy
      ms-notification:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 360s

  ms-notification:
    build: ./ms-notification
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sanossalvos
      SPRING_DATASOURCE_USERNAME: sanossalvos
      SPRING_DATASOURCE_PASSWORD: sanossalvos
      JWT_SECRET: ${JWT_SECRET:-clave_local_desarrollo_no_usar_en_produccion}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-correo@ejemplo.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-password}
      # Deshabilita el health check de correo para no bloquear el arranque
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 360s

  # ─────────────────────────────────────────────
  # BFF — agrega respuestas de los microservicios
  # para el frontend. NO pasa por el gateway.
  # ─────────────────────────────────────────────
  bff:
    build: ./bff
    ports:
      - "8086:8086"
    environment:
      JWT_SECRET: ${JWT_SECRET:-clave_local_desarrollo_no_usar_en_produccion}
      USER_AUTH_URL: http://ms-user-auth:8084
      PET_MANAGEMENT_URL: http://ms-pet-management:8081
      GEOLOCATION_URL: http://ms-geolocation:8082
      MATCHING_ENGINE_URL: http://ms-matching-engine:8083
      NOTIFICATION_URL: http://ms-notification:8085
    depends_on:
      ms-user-auth:
        condition: service_healthy
      ms-pet-management:
        condition: service_healthy
      ms-geolocation:
        condition: service_healthy
      ms-matching-engine:
        condition: service_healthy
      ms-notification:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/api/actuator/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 360s

  # ─────────────────────────────────────────────
  # Gateway — punto de entrada externo único
  # ─────────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      USER_AUTH_URL: http://ms-user-auth:8084
      PET_MANAGEMENT_URL: http://ms-pet-management:8081
      GEOLOCATION_URL: http://ms-geolocation:8082
      MATCHING_ENGINE_URL: http://ms-matching-engine:8083
      NOTIFICATION_URL: http://ms-notification:8085
      BFF_URL: http://bff:8086
    depends_on:
      bff:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────────
  # Frontend React (servido por nginx)
  # ─────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "5173:80"   # nginx escucha en 80 dentro del contenedor
    depends_on:
      - bff

volumes:
  postgres_data:
  minio_data:
