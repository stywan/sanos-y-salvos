services:

  # ─────────────────────────────────────────────
  # Base de datos
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sanossalvos
      POSTGRES_PASSWORD: sanossalvos
      POSTGRES_DB: sanossalvos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanossalvos"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Almacenamiento de objetos (fotos de mascotas)
  # Consola web: http://localhost:9001
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: sanossalvos
      MINIO_ROOT_PASSWORD: sanossalvos123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Microservicios
  # ─────────────────────────────────────────────
  ms-user-auth:
    build: ./ms-user-auth
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sanossalvos
      SPRING_DATASOURCE_USERNAME: sanossalvos
      SPRING_DATASOURCE_PASSWORD: sanossalvos
      JWT_SECRET: clave_local_desarrollo_no_usar_en_produccion
      JWT_EXPIRATION_MS: 86400000
    depends_on:
      postgres:
        condition: service_healthy

  ms-pet-management:
    build: ./ms-pet-management
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sanossalvos
      SPRING_DATASOURCE_USERNAME: sanossalvos
      SPRING_DATASOURCE_PASSWORD: sanossalvos
      JWT_SECRET: clave_local_desarrollo_no_usar_en_produccion
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: sanossalvos
      MINIO_SECRET_KEY: sanossalvos123
      MINIO_BUCKET: fotos-mascotas
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  ms-geolocation:
    build: ./ms-geolocation
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sanossalvos
      SPRING_DATASOURCE_USERNAME: sanossalvos
      SPRING_DATASOURCE_PASSWORD: sanossalvos
      JWT_SECRET: clave_local_desarrollo_no_usar_en_produccion
    depends_on:
      postgres:
        condition: service_healthy

  ms-matching-engine:
    build: ./ms-matching-engine
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sanossalvos
      SPRING_DATASOURCE_USERNAME: sanossalvos
      SPRING_DATASOURCE_PASSWORD: sanossalvos
      PET_MANAGEMENT_URL: http://ms-pet-management:8081
      GEOLOCATION_URL: http://ms-geolocation:8082
    depends_on:
      postgres:
        condition: service_healthy

  ms-notification:
    build: ./ms-notification
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sanossalvos
      SPRING_DATASOURCE_USERNAME: sanossalvos
      SPRING_DATASOURCE_PASSWORD: sanossalvos
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # BFF — llama directo a los microservicios,
  # NO a través del gateway (evita ciclo)
  # ─────────────────────────────────────────────
  bff:
    build: ./bff
    ports:
      - "8086:8086"
    environment:
      USER_AUTH_URL: http://ms-user-auth:8084
      PET_MANAGEMENT_URL: http://ms-pet-management:8081
      GEOLOCATION_URL: http://ms-geolocation:8082
      MATCHING_ENGINE_URL: http://ms-matching-engine:8083
      NOTIFICATION_URL: http://ms-notification:8085
    depends_on:
      - ms-user-auth
      - ms-pet-management
      - ms-geolocation
      - ms-matching-engine
      - ms-notification

  # ─────────────────────────────────────────────
  # Gateway — punto de entrada externo
  # Enruta hacia los microservicios y el BFF
  # ─────────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      USER_AUTH_URL: http://ms-user-auth:8084
      PET_MANAGEMENT_URL: http://ms-pet-management:8081
      GEOLOCATION_URL: http://ms-geolocation:8082
      MATCHING_ENGINE_URL: http://ms-matching-engine:8083
      NOTIFICATION_URL: http://ms-notification:8085
      BFF_URL: http://bff:8086
    depends_on:
      - ms-user-auth
      - ms-pet-management
      - ms-geolocation
      - ms-matching-engine
      - ms-notification
      - bff

  # ─────────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - bff

volumes:
  postgres_data:
  minio_data:
