spring.application.name=ms-matching-engine
server.port=8083

# ---- Base de datos ----
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sanossalvos}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sanossalvos}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sanossalvos}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.open-in-view=false

# ---- URLs internas de otros microservicios ----
services.pet-management.url=${PET_MANAGEMENT_URL:http://localhost:8081}
services.geolocation.url=${GEOLOCATION_URL:http://localhost:8082}
services.notification.url=${NOTIFICATION_URL:http://localhost:8085}

# ---- Circuit Breaker (Resilience4j) ----
# Aplica a llamadas hacia ms-pet-management, ms-geolocation y ms-notification
resilience4j.circuitbreaker.instances.petManagement.sliding-window-size=5
resilience4j.circuitbreaker.instances.petManagement.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.petManagement.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.petManagement.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.petManagement.permitted-number-of-calls-in-half-open-state=2

resilience4j.circuitbreaker.instances.geolocation.sliding-window-size=5
resilience4j.circuitbreaker.instances.geolocation.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.geolocation.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.geolocation.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.geolocation.permitted-number-of-calls-in-half-open-state=2

resilience4j.circuitbreaker.instances.notification.sliding-window-size=5
resilience4j.circuitbreaker.instances.notification.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.notification.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.notification.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.notification.permitted-number-of-calls-in-half-open-state=2

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info,circuitbreakers
management.endpoint.health.show-details=always
