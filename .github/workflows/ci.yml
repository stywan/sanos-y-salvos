name: CI — Sanos y Salvos

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Opt-in a Node.js 24 para todas las GitHub Actions del workflow
# (evita warnings de deprecación de Node 20 antes de junio 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # Build y tests de cada microservicio Java
  # ─────────────────────────────────────────────
  test-java:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - ms-user-auth
          - ms-pet-management
          - ms-geolocation
          - ms-matching-engine
          - ms-notification
          - bff
          - api-gateway

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sanossalvos
          POSTGRES_PASSWORD: sanossalvos
          POSTGRES_DB: sanossalvos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build y tests con cobertura
        working-directory: ./${{ matrix.service }}
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/sanossalvos
          SPRING_DATASOURCE_USERNAME: sanossalvos
          SPRING_DATASOURCE_PASSWORD: sanossalvos
          JWT_SECRET: ci_secret_no_usar_en_produccion_minimo_256_bits_xxxxxxxxxxx
        # "test" dispara automáticamente prepare-agent + report de JaCoCo (atados a la fase test).
        # Sin "verify" no se ejecuta el check del 60% — se activa en Parcial 3 cambiando a "verify".
        run: ./mvnw test --no-transfer-progress

      - name: Subir reporte JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-${{ matrix.service }}
          path: ${{ matrix.service }}/target/site/jacoco/
          retention-days: 7
          if-no-files-found: ignore

  # ─────────────────────────────────────────────
  # Build del frontend
  # ─────────────────────────────────────────────
  test-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: ./frontend
        run: npm ci

      - name: Build producción
        working-directory: ./frontend
        run: npm run build

  # ─────────────────────────────────────────────
  # SonarQube (solo en push a main/develop)
  # ─────────────────────────────────────────────
  sonar:
    name: SonarQube — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test-java
    if: github.event_name == 'push'

    strategy:
      fail-fast: false
      matrix:
        service:
          - ms-user-auth
          - ms-pet-management
          - ms-geolocation
          - ms-matching-engine
          - ms-notification
          - bff

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sanossalvos
          POSTGRES_PASSWORD: sanossalvos
          POSTGRES_DB: sanossalvos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Requerido por SonarQube

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build y análisis SonarQube
        working-directory: ./${{ matrix.service }}
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/sanossalvos
          SPRING_DATASOURCE_USERNAME: sanossalvos
          SPRING_DATASOURCE_PASSWORD: sanossalvos
          JWT_SECRET: ci_secret_no_usar_en_produccion_minimo_256_bits_xxxxxxxxxxx
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          ./mvnw test org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            --no-transfer-progress \
            -Dsonar.organization=sanos-y-salvos \
            -Dsonar.projectKey=sanos-y-salvos-${{ matrix.service }} \
            -Dsonar.projectName="Sanos y Salvos - ${{ matrix.service }}" \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
