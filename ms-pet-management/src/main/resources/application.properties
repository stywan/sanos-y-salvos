spring.application.name=ms-pet-management
server.port=8081

# ---- Base de datos ----
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sanossalvos}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sanossalvos}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sanossalvos}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- JWT (mismo secreto que ms-user-auth — solo validación) ----
jwt.secret=${JWT_SECRET:clave_local_desarrollo_no_usar_en_produccion}

# ---- MinIO ----
minio.url=${MINIO_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:sanossalvos}
minio.secret-key=${MINIO_SECRET_KEY:sanossalvos123}
minio.bucket=${MINIO_BUCKET:fotos-mascotas}

# ---- Subida de archivos (fotos mascotas, máx 5MB) ----
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
spring.jpa.open-in-view=false
