# ================================================
# SonarQube / SonarCloud — Sanos y Salvos
# ================================================
# Proyecto raíz (análisis global del monorepo)
# Para análisis individual por servicio, usar el
# job "sonar" del pipeline de GitHub Actions.
# ================================================

sonar.projectKey=sanos-y-salvos
sonar.projectName=Sanos y Salvos
sonar.projectVersion=1.0.0
sonar.organization=sanos-y-salvos

# Fuentes del monorepo
sonar.modules=ms-user-auth,ms-pet-management,ms-geolocation,ms-matching-engine,ms-notification,bff

# Configuración por módulo
ms-user-auth.sonar.projectName=ms-user-auth
ms-user-auth.sonar.projectBaseDir=ms-user-auth
ms-user-auth.sonar.sources=src/main/java
ms-user-auth.sonar.tests=src/test/java
ms-user-auth.sonar.java.binaries=target/classes
ms-user-auth.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

ms-pet-management.sonar.projectName=ms-pet-management
ms-pet-management.sonar.projectBaseDir=ms-pet-management
ms-pet-management.sonar.sources=src/main/java
ms-pet-management.sonar.tests=src/test/java
ms-pet-management.sonar.java.binaries=target/classes
ms-pet-management.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

ms-geolocation.sonar.projectName=ms-geolocation
ms-geolocation.sonar.projectBaseDir=ms-geolocation
ms-geolocation.sonar.sources=src/main/java
ms-geolocation.sonar.tests=src/test/java
ms-geolocation.sonar.java.binaries=target/classes
ms-geolocation.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

ms-matching-engine.sonar.projectName=ms-matching-engine
ms-matching-engine.sonar.projectBaseDir=ms-matching-engine
ms-matching-engine.sonar.sources=src/main/java
ms-matching-engine.sonar.tests=src/test/java
ms-matching-engine.sonar.java.binaries=target/classes
ms-matching-engine.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

ms-notification.sonar.projectName=ms-notification
ms-notification.sonar.projectBaseDir=ms-notification
ms-notification.sonar.sources=src/main/java
ms-notification.sonar.tests=src/test/java
ms-notification.sonar.java.binaries=target/classes
ms-notification.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

bff.sonar.projectName=bff
bff.sonar.projectBaseDir=bff
bff.sonar.sources=src/main/java
bff.sonar.tests=src/test/java
bff.sonar.java.binaries=target/classes
bff.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclusiones globales
sonar.exclusions=**/target/**,**/node_modules/**,**/.mvn/**,**/dist/**,**/*Application.java

# Umbral de cobertura (falla el análisis si cae del 60%)
sonar.coverage.minimum=60
